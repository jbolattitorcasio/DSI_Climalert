spring.application.name=climalert

# Weather API
weather.api.key=TU_API_KEY
weather.api.url=http://api.weatherapi.com/v1/current.json
weather.api.location=Buenos Aires

# Base de datos H2
spring.datasource.url=jdbc:h2:file:./data/climalert
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Mail (ejemplo con Gmail, o usá Mailtrap/Mailhog para no mandar mails reales)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu_correo@gmail.com
spring.mail.password=tu_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true